# nw-omarchy default libinput-gestures config.
# Mirrors the user's hypr gesture (3-finger horizontal → workspace) and adds
# a sensible 4-finger horizontal (move active window across workspaces).
#
# To customise: this file is symlinked to ~/.config/libinput-gestures.conf.
# Replace the symlink with your own copy if you want to diverge — there's no
# native include directive in libinput-gestures, so we can't do a layered shim.
# Reload after edits:  libinput-gestures-setup restart
#
# Test what gestures your touchpad sees: `libinput-debug-events`.

#─── Workspace switch — parity with hypr `gesture = 3, horizontal, workspace`
gesture swipe left  3 bspc desktop -f next.local
gesture swipe right 3 bspc desktop -f prev.local

#─── Move active window across workspaces (and follow it)
gesture swipe left  4 bspc node -d next.local --follow
gesture swipe right 4 bspc node -d prev.local --follow

#─── Pinch (placeholder — no native bspwm equivalent, leave for the user)
# gesture pinch in  2 ...
# gesture pinch out 2 ...
