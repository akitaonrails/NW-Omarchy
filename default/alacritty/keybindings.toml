# nw-omarchy alacritty overrides — appended to the user's alacritty general.import.
# See install/alacritty.sh for the wiring.
#
# We bind both halves of the universal-clipboard pair:
#   Ctrl+Insert  → Copy   (paired with super+c via xdotool)
#   Shift+Insert → Paste  (paired with super+v via xdotool)
#
# Defaults in alacritty: Shift+Insert pastes from PRIMARY (X selection),
# Ctrl+Insert is unbound. Both rebound to use CLIPBOARD here so the
# universal copy/paste flow round-trips cleanly through a terminal.

[[keyboard.bindings]]
key = "Insert"
mods = "Control"
action = "Copy"

[[keyboard.bindings]]
key = "Insert"
mods = "Shift"
action = "Paste"

# Make Ctrl+V paste from CLIPBOARD too. Pairs with super+v → ctrl+v
# so the universal paste round-trips through alacritty. Loses bash
# readline's `verbatim next char` (rarely used; ctrl+q is the same in
# emacs-mode readline on most setups).
[[keyboard.bindings]]
key = "V"
mods = "Control"
action = "Paste"
