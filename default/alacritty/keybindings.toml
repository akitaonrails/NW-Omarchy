# nw-omarchy alacritty overrides — appended to the user's alacritty general.import.
# See install/alacritty.sh for the wiring.
#
# Defaults in alacritty: Shift+Insert pastes from PRIMARY (X selection),
# Ctrl+Insert is unbound, Ctrl+V is forwarded to the running app
# (bash readline `verbatim`, etc). We rebind all three to use the
# CLIPBOARD selection so terminal copy/paste matches every other GUI
# app on the system. Loses bash readline's `quoted-insert` on Ctrl+V —
# Ctrl+Q is the same in emacs-mode readline on most setups.

[[keyboard.bindings]]
key = "Insert"
mods = "Control"
action = "Copy"

[[keyboard.bindings]]
key = "Insert"
mods = "Shift"
action = "Paste"

[[keyboard.bindings]]
key = "V"
mods = "Control"
action = "Paste"
