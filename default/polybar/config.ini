; nw-omarchy default polybar config.
; The [colors] section is rendered from the active omarchy theme by
; omarchy-theme-set-templates and read in via include-file below. Polybar's
; include-file does NOT merge sections — it errors on duplicate keys — so
; we cannot keep a static [colors] block here as a fallback. The install
; step (install/themed.sh) renders this file once on apply; after that,
; every omarchy-theme-set rewrites it.
; Render path: ~/.config/omarchy/themed/polybar-colors.ini.tpl  →  current/theme/.

include-file = ~/.config/omarchy/current/theme/polybar-colors.ini

[bar/main]
width            = 100%
height           = 28
radius           = 0
fixed-center     = true
background       = ${colors.background}
foreground       = ${colors.foreground}
line-size        = 2
border-size      = 0
padding-left     = 1
padding-right    = 1
module-margin    = 1
font-0           = JetBrainsMono Nerd Font:size=10;2
font-1           = Symbols Nerd Font:size=12;2

modules-left     = bspwm
modules-center   = date
modules-right    = pulseaudio battery wlan

cursor-click     = pointer
enable-ipc       = true

[module/bspwm]
type = internal/bspwm
label-focused           = %name%
label-focused-background = ${colors.background-alt}
label-focused-foreground = ${colors.primary}
label-focused-padding   = 1
label-occupied          = %name%
label-occupied-padding  = 1
label-empty             = %name%
label-empty-foreground  = ${colors.disabled}
label-empty-padding     = 1
label-urgent            = %name%
label-urgent-foreground = ${colors.alert}
label-urgent-padding    = 1

[module/date]
type     = internal/date
interval = 5
date     = %Y-%m-%d
time     = %H:%M
label    = %date%  %time%

[module/pulseaudio]
type            = internal/pulseaudio
format-volume   = <ramp-volume> <label-volume>
label-volume    = %percentage%%
label-muted     =  muted
label-muted-foreground = ${colors.disabled}
ramp-volume-0   =
ramp-volume-1   =
ramp-volume-2   =

[module/battery]
type     = internal/battery
battery  = BAT0
adapter  = ADP1
full-at  = 99
format-charging    = <ramp-capacity> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full        = <ramp-capacity> <label-full>
label-charging     = %percentage%%
label-discharging  = %percentage%%
label-full         = full
ramp-capacity-0    =
ramp-capacity-1    =
ramp-capacity-2    =
ramp-capacity-3    =
ramp-capacity-4    =

[module/wlan]
type           = internal/network
interface-type = wireless
interval       = 3
format-connected    = <ramp-signal> <label-connected>
label-connected     = %essid% %signal%%
label-disconnected  = %{F#6c7086}offline%{F-}
ramp-signal-0       =
ramp-signal-1       =
ramp-signal-2       =
ramp-signal-3       =
ramp-signal-4       =
