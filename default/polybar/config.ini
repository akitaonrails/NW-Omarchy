; nw-omarchy default polybar config.
; The [colors] section is rendered from the active omarchy theme by
; omarchy-theme-set-templates and read in via include-file below. Polybar's
; include-file does NOT merge sections — it errors on duplicate keys — so
; we cannot keep a static [colors] block here as a fallback. The install
; step (install/themed.sh) renders this file once on apply; after that,
; every omarchy-theme-set rewrites it.
; Render path: ~/.config/omarchy/themed/polybar-colors.ini.tpl  →  current/theme/.

include-file = ~/.config/omarchy/current/theme/polybar-colors.ini

[bar/main]
width            = 100%
height           = 24
radius           = 0
fixed-center     = true
background       = ${colors.background}
foreground       = ${colors.foreground}
line-size        = 2
border-size      = 0
padding-left     = 1
padding-right    = 2
module-margin    = 1
font-0           = JetBrainsMono Nerd Font:size=10;2
font-1           = Symbols Nerd Font:size=13;3
font-2           = Symbols Nerd Font Mono:size=13;3
; omarchy.ttf (in ~/.local/share/fonts/) provides the omarchy logo glyph at U+E900.
font-3           = omarchy:size=14;3

modules-left     = omarchy bspwm
modules-center   = date
modules-right    = update pulseaudio bluetooth wlan battery

cursor-click     = pointer
enable-ipc       = true

;─── Omarchy logo — left-click opens nw-omarchy-menu, right-click jumps to System ─
; Parity with omarchy waybar's `custom/omarchy` button.
[module/omarchy]
type               = custom/text
format             = <label>
label              = 
label-font         = 4
label-foreground   = ${colors.primary}
label-padding      = 0
click-left         = nw-omarchy-menu
click-right        = nw-omarchy-menu System

;─── Workspaces — omarchy waybar parity: active = filled dot, others = number ─
[module/bspwm]
type   = internal/bspwm
format = <label-state>

label-focused             = 󱓻
label-focused-foreground  = ${colors.primary}
label-focused-padding     = 1

label-occupied            = %name%
label-occupied-foreground = ${colors.foreground}
label-occupied-padding    = 1

label-empty               = %name%
label-empty-foreground    = ${colors.disabled}
label-empty-padding       = 1

label-urgent              = %name%
label-urgent-foreground   = ${colors.alert}
label-urgent-padding      = 1

;─── Date — "Wed, Apr 29 4:17pm" ─────────────────────────────────────
; Polybar's internal/date passes the format directly to strftime(3), but its
; parser doesn't honour the GNU `%-l` no-padding flag (renders it literal).
; We shell out to /usr/bin/date which does, so the hour displays as `4`,
; not ` 4`.
[module/date]
type     = custom/script
exec     = date '+%a, %b %d %-l:%M%P'
interval = 30
; %{A1:cmd:}…%{A} = polybar action tag for button 1 (left-click). Wrapping
; the label fires the command on click and reliably overrides any
; module-default click handler. Module-level click-left= sometimes gets
; shadowed by internal-module defaults (notably internal/pulseaudio's
; hard-coded toggle-mute) — action tags inside format/label never do.
format = <label>
label  = %{A1:nw-omarchy-menu Update:}%output%%{A}
label-foreground = ${colors.foreground}

;─── Update available — pulses when omarchy-update-available signals an
; upgrade. Hidden when up-to-date (script outputs empty string).
; Click left → present-floating-terminal running `omarchy-update`.
[module/update]
type     = custom/script
exec     = bash -c 'omarchy-update-available >/dev/null 2>&1 && printf "  update"'
interval = 600
format   = %{A1:nw-omarchy-launch-floating-terminal omarchy-update:}<label>%{A}
label    = %output%
label-foreground = ${colors.alert}

;─── Audio — speaker icon ramp by volume.
;     left-click   → wiremix TUI       (overrides default mute via %{A1})
;     middle-click → mute toggle
;     right-click  → pavucontrol GUI
;     scroll       → volume ±5%
[module/pulseaudio]
type                     = internal/pulseaudio
; Single A1 left-click action tag is reliable in polybar 3.7.x; the
; module-level click-right / click-middle keys handle secondary buttons.
format-volume            = %{A1:nw-omarchy-launch-audio:}<ramp-volume>  <label-volume>%{A}
format-volume-foreground = ${colors.foreground}
label-volume             = %percentage%%
format-muted             = %{A1:nw-omarchy-launch-audio:}<label-muted>%{A}
label-muted              = 󰝟  muted
label-muted-foreground   = ${colors.disabled}
ramp-volume-0            = 󰕿
ramp-volume-1            = 󰖀
ramp-volume-2            = 󰕾
click-right              = pavucontrol
click-middle             = pactl set-sink-mute @DEFAULT_SINK@ toggle
scroll-up                = pactl set-sink-volume @DEFAULT_SINK@ +5%
scroll-down              = pactl set-sink-volume @DEFAULT_SINK@ -5%

;─── Bluetooth — static icon.
;     left-click  → bluetui TUI       (parity: omarchy-launch-bluetooth)
;     right-click → blueman-manager GUI
;
; Uses format/label (not the deprecated `content =`) so the %{A…} action
; tags inside the label fire correctly. The deprecated content form has
; spotty click support across polybar 3.x versions.
[module/bluetooth]
type             = custom/text
format           = <label>
label            = %{A1:nw-omarchy-launch-bluetooth:}󰂯%{A}
label-foreground = ${colors.foreground}
label-padding    = 1
click-right      = blueman-manager

;─── Wifi — signal-strength ramp + ESSID; offline shows crossed icon ─
[module/wlan]
type           = internal/network
interface-type = wireless
interval       = 3

format-connected             = %{A1:nw-omarchy-launch-wifi:}<ramp-signal>  <label-connected>%{A}
label-connected              = %essid%
label-connected-foreground   = ${colors.foreground}

format-disconnected          = %{A1:nw-omarchy-launch-wifi:}<label-disconnected>%{A}
label-disconnected           = 󰤮  offline
label-disconnected-foreground = ${colors.disabled}

ramp-signal-0          = 󰤯
ramp-signal-1          = 󰤟
ramp-signal-2          = 󰤢
ramp-signal-3          = 󰤥
ramp-signal-4          = 󰤨
ramp-signal-foreground = ${colors.foreground}

click-right = nm-connection-editor

;─── Battery — custom/script driving full state machine ──────────────
; Polybar 3.7.2's internal/battery has no format-not-charging — it treats
; "Not charging" (AC plugged but firmware paused, typical ThinkPad with
; charge thresholds) as Discharging, so the bar looks frozen with no
; plug cue. Our script reads BAT0/status + AC/online and emits inline
; %{F#hex} color tags pulled from the active omarchy theme palette.
[module/battery]
type     = custom/script
exec     = nw-omarchy-cmd-battery
interval = 5
format   = %{A1:nw-omarchy-menu Setup:}<label>%{A}
label    = %output%
