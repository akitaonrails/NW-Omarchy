; nw-omarchy default polybar config.
; The [colors] section is rendered from the active omarchy theme by
; omarchy-theme-set-templates and read in via include-file below. Polybar's
; include-file does NOT merge sections ‚Äî it errors on duplicate keys ‚Äî so
; we cannot keep a static [colors] block here as a fallback. The install
; step (install/themed.sh) renders this file once on apply; after that,
; every omarchy-theme-set rewrites it.
; Render path: ~/.config/omarchy/themed/polybar-colors.ini.tpl  ‚Üí  current/theme/.

include-file = ~/.config/omarchy/current/theme/polybar-colors.ini

[bar/main]
width            = 100%
height           = 24
radius           = 0
fixed-center     = true
background       = ${colors.background}
foreground       = ${colors.foreground}
line-size        = 2
border-size      = 0
padding-left     = 1
padding-right    = 2
module-margin    = 2
font-0           = JetBrainsMono Nerd Font:size=10;2
font-1           = Symbols Nerd Font:size=13;3
font-2           = Symbols Nerd Font Mono:size=13;3
; omarchy.ttf (in ~/.local/share/fonts/) provides the omarchy logo glyph at U+E900.
font-3           = omarchy:size=14;3

modules-left     = omarchy bspwm
modules-center   = date
modules-right    = pulseaudio bluetooth wlan battery

cursor-click     = pointer
enable-ipc       = true

;‚îÄ‚îÄ‚îÄ Omarchy logo ‚Äî left-click opens nw-omarchy-menu, right-click jumps to System ‚îÄ
; Parity with omarchy waybar's `custom/omarchy` button.
[module/omarchy]
type               = custom/text
format             = <label>
label              = Ó§Ä
label-font         = 4
label-foreground   = ${colors.primary}
label-padding      = 1
click-left         = nw-omarchy-menu
click-right        = nw-omarchy-menu System

;‚îÄ‚îÄ‚îÄ Workspaces ‚Äî omarchy waybar parity: active = filled dot, others = number ‚îÄ
[module/bspwm]
type   = internal/bspwm
format = <label-state>

label-focused             = Û±ìª
label-focused-foreground  = ${colors.primary}
label-focused-padding     = 1

label-occupied            = %name%
label-occupied-foreground = ${colors.foreground}
label-occupied-padding    = 1

label-empty               = %name%
label-empty-foreground    = ${colors.disabled}
label-empty-padding       = 1

label-urgent              = %name%
label-urgent-foreground   = ${colors.alert}
label-urgent-padding      = 1

;‚îÄ‚îÄ‚îÄ Date ‚Äî "Wed, Apr 29 4:17pm" ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
; Polybar's internal/date passes the format directly to strftime(3), but its
; parser doesn't honour the GNU `%-l` no-padding flag (renders it literal).
; We shell out to /usr/bin/date which does, so the hour displays as `4`,
; not ` 4`.
[module/date]
type     = custom/script
exec     = date '+%a, %b %d %-l:%M%P'
interval = 30
; %{A1:cmd:}‚Ä¶%{A} = polybar action tag for button 1 (left-click). Wrapping
; the label fires the command on click and reliably overrides any
; module-default click handler. Module-level click-left= sometimes gets
; shadowed by internal-module defaults (notably internal/pulseaudio's
; hard-coded toggle-mute) ‚Äî action tags inside format/label never do.
format = <label>
label  = %{A1:nw-omarchy-menu Update:}%output%%{A}
label-foreground = ${colors.foreground}

;‚îÄ‚îÄ‚îÄ Audio ‚Äî speaker icon ramp by volume.
;     left-click   ‚Üí wiremix TUI       (overrides default mute via %{A1})
;     middle-click ‚Üí mute toggle
;     right-click  ‚Üí pavucontrol GUI
;     scroll       ‚Üí volume ¬±5%
[module/pulseaudio]
type                     = internal/pulseaudio
; Single A1 left-click action tag is reliable in polybar 3.7.x; the
; module-level click-right / click-middle keys handle secondary buttons.
format-volume            = %{A1:nw-omarchy-launch-audio:}<ramp-volume>  <label-volume>%{A}
format-volume-foreground = ${colors.foreground}
label-volume             = %percentage%%
format-muted             = %{A1:nw-omarchy-launch-audio:}<label-muted>%{A}
label-muted              = Û∞ùü  muted
label-muted-foreground   = ${colors.disabled}
ramp-volume-0            = Û∞ïø
ramp-volume-1            = Û∞ñÄ
ramp-volume-2            = Û∞ïæ
click-right              = pavucontrol
click-middle             = pactl set-sink-mute @DEFAULT_SINK@ toggle
scroll-up                = pactl set-sink-volume @DEFAULT_SINK@ +5%
scroll-down              = pactl set-sink-volume @DEFAULT_SINK@ -5%

;‚îÄ‚îÄ‚îÄ Bluetooth ‚Äî static icon.
;     left-click  ‚Üí bluetui TUI       (parity: omarchy-launch-bluetooth)
;     right-click ‚Üí blueman-manager GUI
;
; Uses format/label (not the deprecated `content =`) so the %{A‚Ä¶} action
; tags inside the label fire correctly. The deprecated content form has
; spotty click support across polybar 3.x versions.
[module/bluetooth]
type             = custom/text
format           = <label>
label            = %{A1:nw-omarchy-launch-bluetooth:}Û∞ÇØ%{A}
label-foreground = ${colors.foreground}
label-padding    = 1
click-right      = blueman-manager

;‚îÄ‚îÄ‚îÄ Wifi ‚Äî signal-strength ramp + ESSID; offline shows crossed icon ‚îÄ
[module/wlan]
type           = internal/network
interface-type = wireless
interval       = 3

format-connected             = %{A1:nw-omarchy-launch-wifi:}<ramp-signal>  <label-connected>%{A}
label-connected              = %essid%
label-connected-foreground   = ${colors.foreground}

format-disconnected          = %{A1:nw-omarchy-launch-wifi:}<label-disconnected>%{A}
label-disconnected           = Û∞§Æ  offline
label-disconnected-foreground = ${colors.disabled}

ramp-signal-0          = Û∞§Ø
ramp-signal-1          = Û∞§ü
ramp-signal-2          = Û∞§¢
ramp-signal-3          = Û∞§•
ramp-signal-4          = Û∞§®
ramp-signal-foreground = ${colors.foreground}

click-right = nm-connection-editor

;‚îÄ‚îÄ‚îÄ Battery ‚Äî capacity ramp, charging variant in primary ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
[module/battery]
type     = internal/battery
battery  = BAT0
adapter  = AC
full-at  = 99

; %{A1:nw-omarchy-menu Setup:} wraps each format so left-click jumps to
; the Setup submenu (Power Profile lives there).
format-charging              = %{A1:nw-omarchy-menu Setup:}<ramp-capacity>  <label-charging>%{A}
format-charging-foreground   = ${colors.primary}
label-charging               = %percentage%%

format-discharging           = %{A1:nw-omarchy-menu Setup:}<ramp-capacity>  <label-discharging>%{A}
format-discharging-foreground = ${colors.foreground}
label-discharging            = %percentage%%

format-full                  = %{A1:nw-omarchy-menu Setup:}Û∞Åπ  <label-full>%{A}
format-full-foreground       = ${colors.secondary}
label-full                   = full

ramp-capacity-0 = Û∞Å∫
ramp-capacity-1 = Û∞Åª
ramp-capacity-2 = Û∞Åº
ramp-capacity-3 = Û∞ÅΩ
ramp-capacity-4 = Û∞Åæ
ramp-capacity-5 = Û∞Åø
ramp-capacity-6 = Û∞ÇÄ
ramp-capacity-7 = Û∞ÇÅ
ramp-capacity-8 = Û∞ÇÇ
ramp-capacity-9 = Û∞Åπ
