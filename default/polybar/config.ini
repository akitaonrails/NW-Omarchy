; nw-omarchy default polybar config.
; The [colors] section is rendered from the active omarchy theme by
; omarchy-theme-set-templates and read in via include-file below. Polybar's
; include-file does NOT merge sections — it errors on duplicate keys — so
; we cannot keep a static [colors] block here as a fallback. The install
; step (install/themed.sh) renders this file once on apply; after that,
; every omarchy-theme-set rewrites it.
; Render path: ~/.config/omarchy/themed/polybar-colors.ini.tpl  →  current/theme/.

include-file = ~/.config/omarchy/current/theme/polybar-colors.ini

[bar/main]
width            = 100%
height           = 24
radius           = 0
fixed-center     = true
background       = ${colors.background}
foreground       = ${colors.foreground}
line-size        = 2
border-size      = 0
padding-left     = 1
padding-right    = 2
module-margin    = 2
font-0           = JetBrainsMono Nerd Font:size=10;2
font-1           = Symbols Nerd Font:size=13;3
font-2           = Symbols Nerd Font Mono:size=13;3

modules-left     = bspwm
modules-center   = date
modules-right    = pulseaudio bluetooth wlan battery

cursor-click     = pointer
enable-ipc       = true

;─── Workspaces — omarchy waybar parity: active = filled dot, others = number ─
[module/bspwm]
type   = internal/bspwm
format = <label-state>

label-focused             = 󱓻
label-focused-foreground  = ${colors.primary}
label-focused-padding     = 1

label-occupied            = %name%
label-occupied-foreground = ${colors.foreground}
label-occupied-padding    = 1

label-empty               = %name%
label-empty-foreground    = ${colors.disabled}
label-empty-padding       = 1

label-urgent              = %name%
label-urgent-foreground   = ${colors.alert}
label-urgent-padding      = 1

;─── Date — "Wed, Apr 29 4:17pm" ─────────────────────────────────────
; Polybar's internal/date passes the format directly to strftime(3), but its
; parser doesn't honour the GNU `%-l` no-padding flag (renders it literal).
; We shell out to /usr/bin/date which does, so the hour displays as `4`,
; not ` 4`.
[module/date]
type     = custom/script
exec     = date '+%a, %b %d %-l:%M%P'
interval = 30
label    = %output%
label-foreground = ${colors.foreground}

;─── Audio — speaker icon ramp by volume; right-click opens pavucontrol ─
[module/pulseaudio]
type                     = internal/pulseaudio
format-volume            = <ramp-volume>  <label-volume>
format-volume-foreground = ${colors.foreground}
label-volume             = %percentage%%
format-muted             = <label-muted>
label-muted              = 󰝟  muted
label-muted-foreground   = ${colors.disabled}
ramp-volume-0            = 󰕿
ramp-volume-1            = 󰖀
ramp-volume-2            = 󰕾
click-right              = pavucontrol

;─── Bluetooth — static icon, click opens blueman-manager ───────────
[module/bluetooth]
type               = custom/text
content            = 󰂯
content-foreground = ${colors.foreground}
content-padding    = 1
click-left         = blueman-manager

;─── Wifi — signal-strength ramp + ESSID; offline shows crossed icon ─
[module/wlan]
type           = internal/network
interface-type = wireless
interval       = 3

format-connected             = <ramp-signal>  <label-connected>
label-connected              = %essid%
label-connected-foreground   = ${colors.foreground}

format-disconnected          = <label-disconnected>
label-disconnected           = 󰤮  offline
label-disconnected-foreground = ${colors.disabled}

ramp-signal-0          = 󰤯
ramp-signal-1          = 󰤟
ramp-signal-2          = 󰤢
ramp-signal-3          = 󰤥
ramp-signal-4          = 󰤨
ramp-signal-foreground = ${colors.foreground}

click-left = nm-connection-editor

;─── Battery — capacity ramp, charging variant in primary ────────────
[module/battery]
type     = internal/battery
battery  = BAT0
adapter  = AC
full-at  = 99

format-charging              = <ramp-capacity>  <label-charging>
format-charging-foreground   = ${colors.primary}
label-charging               = %percentage%%

format-discharging           = <ramp-capacity>  <label-discharging>
format-discharging-foreground = ${colors.foreground}
label-discharging            = %percentage%%

format-full                  = 󰁹  <label-full>
format-full-foreground       = ${colors.secondary}
label-full                   = full

ramp-capacity-0 = 󰁺
ramp-capacity-1 = 󰁻
ramp-capacity-2 = 󰁼
ramp-capacity-3 = 󰁽
ramp-capacity-4 = 󰁾
ramp-capacity-5 = 󰁿
ramp-capacity-6 = 󰂀
ramp-capacity-7 = 󰂁
ramp-capacity-8 = 󰂂
ramp-capacity-9 = 󰁹
