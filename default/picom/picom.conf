## nw-omarchy default picom.conf — upstream picom v13 (Arch extra: picom).
##
## Replaces the abandoned FT-Labs/picom fork (AUR picom-ftlabs-git, last
## commit Feb 2024). The FT-Labs animation system was designed for dwm
## and never engaged on bspwm tag-change events (verified via debug log:
## zero anim/slide log lines across 17 unmap/map events on workspace
## switch — only opacity-transition fading was happening).
##
## Upstream v13 (Feb 2026) ships a proper trigger-driven animation system
## with separate `show`/`hide` triggers (visibility changes) distinct from
## `open`/`close` (window lifecycle). bspwm fires X MapNotify/UnmapNotify
## on workspace switch — those are exactly the show/hide trigger events.

#─── backend ─────────────────────────────────────────────────────────
backend = "glx";
vsync = true;
unredir-if-possible = false;
use-damage = true;

#─── rounded corners ─────────────────────────────────────────────────
corner-radius = 8;
rounded-corners-exclude = [
    "class_g = 'polybar'",
    "class_g = 'i3lock'",
    "class_g = 'slop'",
    "class_g = 'maim'",
    "window_type = 'dock'",
    "window_type = 'desktop'"
];

#─── shadows ─────────────────────────────────────────────────────────
shadow = true;
shadow-radius = 8;
shadow-opacity = 0.55;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'polybar'",
    "class_g = 'slop'",
    "class_g = 'maim'",
    "_GTK_FRAME_EXTENTS@:c"
];

#─── opacity (terminal slight transparency, like the hypr config) ───
inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;

opacity-rule = [
    "92:class_g = 'Alacritty' && focused",
    "82:class_g = 'Alacritty' && !focused",
    "92:class_g = 'kitty' && focused",
    "82:class_g = 'kitty' && !focused",
    "92:class_g = 'com.mitchellh.ghostty' && focused",
    "82:class_g = 'com.mitchellh.ghostty' && !focused"
];

#─── blur ────────────────────────────────────────────────────────────
blur: {
    method = "dual_kawase";
    strength = 6;
    background = false;
    background-frame = false;
    background-fixed = false;
};
blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "_GTK_FRAME_EXTENTS@:c",
    # slop draws the screenshot region selector — blurring its overlay
    # would smear the very thing the user is trying to see
    "class_g = 'slop'",
    "class_g = 'maim'"
];

#─── fading ──────────────────────────────────────────────────────────
# Used for opacity-only transitions (focus changes, etc.). The
# animations block below handles slide / appear / disappear.
fading = true;
fade-in-step = 0.05;
fade-out-step = 0.05;
fade-delta = 8;

#─── window-type defaults ────────────────────────────────────────────
wintypes:
{
    tooltip       = { fade = true;  shadow = false; opacity = 0.92; focus = true; };
    dock          = { shadow = false; clip-shadow-above = true; };
    dnd           = { shadow = false; };
    popup_menu    = { opacity = 0.95; };
    dropdown_menu = { opacity = 0.95; };
};

#─── animations ──────────────────────────────────────────────────────
# Intentionally NO `animations = (...)` block — falls back to the
# legacy `fading = true` block above, which gives a simple opacity
# fade on window open/close/show/hide.
#
# Earlier versions of this config drove a custom workspace-pan
# animation (each window's offset-x shifted by window-monitor-width
# on show/hide so they all slid together). It worked but had two
# issues we couldn't square cleanly:
#
#   1. Direction was fixed (out-left / in-right) regardless of
#      next/prev — picom v13 has no WM-action context, so we
#      couldn't mirror the slide for "going back".
#   2. The slop screenshot overlay also got animated through the
#      `open` trigger; suppressing that needs a per-window rule,
#      which forces migrating every legacy exclude/wintype/opacity
#      option into picom v13's new `rules` block in the same change.
#
# A future revisit could be a `bspc subscribe`-driven daemon that
# swaps picom configs (forward / backward) per switch, plus a full
# rules-block migration. Until then: simple fade.
