## nw-omarchy default picom.conf — tuned for picom-ftlabs-git (AUR).
## Approximates the omarchy hypr looknfeel (rounded corners, blur, fade,
## per-window animations, slide-on-workspace-switch).
##
## NB: ftlabs uses simple flag-based animations (animation-for-* +
## animation-stiffness-* + window-mass/dampening). It does NOT use the
## trigger/curve array syntax some other forks (arian8j2, etc) use — that
## block is silently dropped by ftlabs.

#─── backend ─────────────────────────────────────────────────────────
backend = "glx";
vsync = true;
unredir-if-possible = false;
use-damage = true;

#─── rounded corners ─────────────────────────────────────────────────
corner-radius = 8;
rounded-corners-exclude = [
    "class_g = 'polybar'",
    "class_g = 'i3lock'",
    "window_type = 'dock'",
    "window_type = 'desktop'"
];

#─── shadows ─────────────────────────────────────────────────────────
shadow = true;
shadow-radius = 8;
shadow-opacity = 0.55;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'polybar'",
    "_GTK_FRAME_EXTENTS@:c"
];

#─── opacity (terminal slight transparency, like the hypr config) ───
inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;

opacity-rule = [
    "92:class_g = 'Alacritty' && focused",
    "82:class_g = 'Alacritty' && !focused",
    "92:class_g = 'kitty' && focused",
    "82:class_g = 'kitty' && !focused",
    "92:class_g = 'com.mitchellh.ghostty' && focused",
    "82:class_g = 'com.mitchellh.ghostty' && !focused"
];

#─── blur ────────────────────────────────────────────────────────────
blur: {
    method = "dual_kawase";
    strength = 6;
    background = false;
    background-frame = false;
    background-fixed = false;
};
blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "_GTK_FRAME_EXTENTS@:c"
];

#─── fading ──────────────────────────────────────────────────────────
fading = true;
fade-in-step = 0.05;
fade-out-step = 0.05;
fade-delta = 8;

#─── window-type defaults ────────────────────────────────────────────
wintypes:
{
    tooltip       = { fade = true;  shadow = false; opacity = 0.92; focus = true; };
    dock          = { shadow = false; clip-shadow-above = true; };
    dnd           = { shadow = false; };
    popup_menu    = { opacity = 0.95; };
    dropdown_menu = { opacity = 0.95; };
};

#─── animations (picom-ftlabs-git) ──────────────────────────────────
# Spring-based animation system. stiffness controls speed (higher = faster
# settle), dampening controls oscillation, window-mass controls inertia.
animations                     = true;
# Spring physics: perceived speed scales with sqrt(stiffness/mass), so
# doubling stiffness alone is ~1.4× faster — we crank stiffness much
# higher and drop mass for the desired "snappy" feel.
animation-stiffness-in-tag     = 400;
animation-stiffness-tag-change = 500;
animation-dampening            = 25;
animation-window-mass          = 0.2;
animation-clamping             = true;

# Per-event animation styles. Values: none, fade, zoom, squeeze, slide-up,
# slide-down, slide-left, slide-right, slide-in, slide-out.
animation-for-open-window      = "zoom";
animation-for-unmap-window     = "squeeze";
animation-for-transient-window = "zoom";

# Workspace transitions — the closest X11/bspwm gets to Hyprland's
# workspace_swipe. picom-ftlabs r2236 (Feb 2024) silently rejects
# slide-left/slide-right for tag-change and falls back to zoom/fade
# defaults — slide-up/slide-down are the values it actually parses for
# this hook. Windows on the outgoing desktop slide off the bottom and
# new desktop's windows slide in from the top (or vice-versa).
# (No live preview during the gesture — bspwm only signals on
# completion. See docs/porting-hypr.md.)
animation-for-next-tag         = "slide-up";
animation-for-prev-tag         = "slide-down";
