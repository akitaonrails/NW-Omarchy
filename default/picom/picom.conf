## nw-omarchy default picom.conf — tuned for picom-FT-Labs.
## Approximates the omarchy hypr looknfeel (rounded corners, blur, fade,
## window open/close + geometry animations).
##
## If your picom is a non-FT-Labs fork, the `animations` block at the bottom
## is silently ignored. Everything else works on any modern picom.

#─── backend ─────────────────────────────────────────────────────────
backend = "glx";
vsync = true;
unredir-if-possible = false;
use-damage = true;

#─── rounded corners ─────────────────────────────────────────────────
corner-radius = 8;
rounded-corners-exclude = [
    "class_g = 'polybar'",
    "class_g = 'i3lock'",
    "window_type = 'dock'",
    "window_type = 'desktop'"
];

#─── shadows ─────────────────────────────────────────────────────────
shadow = true;
shadow-radius = 8;
shadow-opacity = 0.55;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'polybar'",
    "_GTK_FRAME_EXTENTS@:c"
];

#─── opacity (terminal slight transparency, like the hypr config) ───
inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;

opacity-rule = [
    "92:class_g = 'Alacritty' && focused",
    "82:class_g = 'Alacritty' && !focused",
    "92:class_g = 'kitty' && focused",
    "82:class_g = 'kitty' && !focused",
    "92:class_g = 'com.mitchellh.ghostty' && focused",
    "82:class_g = 'com.mitchellh.ghostty' && !focused"
];

#─── blur ────────────────────────────────────────────────────────────
blur: {
    method = "dual_kawase";
    strength = 6;
    background = false;
    background-frame = false;
    background-fixed = false;
};
blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "_GTK_FRAME_EXTENTS@:c"
];

#─── fading ──────────────────────────────────────────────────────────
fading = true;
fade-in-step = 0.05;
fade-out-step = 0.05;
fade-delta = 8;

#─── window-type defaults ────────────────────────────────────────────
wintypes:
{
    tooltip       = { fade = true;  shadow = false; opacity = 0.92; focus = true; };
    dock          = { shadow = false; clip-shadow-above = true; };
    dnd           = { shadow = false; };
    popup_menu    = { opacity = 0.95; };
    dropdown_menu = { opacity = 0.95; };
};

#─── animations (FT-Labs only — ignored by mainline picom) ──────────
# Easing approximates Hyprland's easeOutQuint / linear pair.
animations = (
    {
        triggers = [ "open", "show" ];
        opacity  = { curve = "cubic-bezier(0.23,1.0,0.32,1.0)"; duration = 0.25; start = 0;    end = 1; };
        scale-x  = { curve = "cubic-bezier(0.23,1.0,0.32,1.0)"; duration = 0.25; start = 0.85; end = 1; };
        scale-y  = { curve = "cubic-bezier(0.23,1.0,0.32,1.0)"; duration = 0.25; start = 0.85; end = 1; };
    },
    {
        triggers = [ "close", "hide" ];
        opacity  = { curve = "linear"; duration = 0.15; start = 1; end = 0;   };
        scale-x  = { curve = "linear"; duration = 0.15; start = 1; end = 0.9; };
        scale-y  = { curve = "linear"; duration = 0.15; start = 1; end = 0.9; };
    },
    {
        triggers = [ "geometry" ];
        scale-x  = { curve = "cubic-bezier(0.23,1.0,0.32,1.0)"; duration = 0.20; start = "scale-x"; end = 1; };
        scale-y  = { curve = "cubic-bezier(0.23,1.0,0.32,1.0)"; duration = 0.20; start = "scale-y"; end = 1; };
        offset-x = { curve = "cubic-bezier(0.23,1.0,0.32,1.0)"; duration = 0.20; start = "offset-x"; end = 0; };
        offset-y = { curve = "cubic-bezier(0.23,1.0,0.32,1.0)"; duration = 0.20; start = "offset-y"; end = 0; };
    }
);
