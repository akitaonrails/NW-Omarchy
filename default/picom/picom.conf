## nw-omarchy default picom.conf — upstream picom v13 (Arch extra: picom).
##
## Migrated to v13's `rules` block (April 2026 sweep). v13 disables ALL
## of the legacy per-window option families (shadow-exclude,
## blur-background-exclude, opacity-rule, rounded-corners-exclude,
## inactive/active-opacity, wintypes) the moment `rules = (...)` is
## set, so the migration has to be done in a single pass.
##
## Behaviour goals (preserved from the legacy config):
##   - rounded corners (8px) on regular windows; off for polybar/i3lock/
##     slop/maim/dock/desktop
##   - drop-shadow on regular windows; off for polybar/notifications/
##     slop/maim/dock/_GTK_FRAME_EXTENTS
##   - dual_kawase blur; off for dock/desktop/slop/maim/GTK frame extents
##   - alacritty/kitty/ghostty: 0.92 focused, 0.82 unfocused
##   - tooltip 0.92, popup/dropdown 0.95
##   - simple opacity fade on open/close/show/hide via legacy fading
##     master switch (still honoured alongside rules)

#─── backend ─────────────────────────────────────────────────────────
backend = "glx";
vsync = true;
unredir-if-possible = false;
use-damage = true;

#─── defaults (apply unless a rule below overrides) ──────────────────
corner-radius = 8;

shadow         = true;
shadow-radius  = 8;
shadow-opacity = 0.55;
shadow-offset-x = -8;
shadow-offset-y = -8;

blur: {
    method   = "dual_kawase";
    strength = 6;
    background       = false;
    background-frame = false;
    background-fixed = false;
};

#─── fading (master switch — still honoured under v13 rules) ─────────
# fade-exclude is superseded by rules; the master `fading` flag and
# its step / delta values still drive the basic opacity transition on
# open/close/show/hide for any window without `fade = false` in rules.
fading       = true;
fade-in-step  = 0.05;
fade-out-step = 0.05;
fade-delta    = 8;

#─── per-window rules (supersedes the entire legacy option family) ──
# Order matters: rules are matched top-to-bottom and later rules take
# precedence on conflicting keys. Class names match against WM_CLASS
# (the second/instance field).
rules = (
    # ─ Polybar bar — no shadow, no rounded corners (it's a panel) ─
    { match = "class_g = 'polybar'";
      shadow         = false;
      corner-radius  = 0; },

    # ─ Lock screen — fills the whole monitor, no corners ─
    { match = "class_g = 'i3lock'";
      corner-radius  = 0; },

    # ─ Screenshot region selector (slop / maim) — no styling at all
    #   on the overlay, otherwise it smears the very thing the user
    #   is trying to capture. Also fade=false so the overlay doesn't
    #   ghost-in for a frame.
    { match = "class_g = 'slop' || class_g = 'maim'";
      shadow         = false;
      corner-radius  = 0;
      blur-background = false;
      fade           = false; },

    # ─ Notifications (dunst) — no extra shadow (dunst draws its own
    #   frame already)
    { match = "name = 'Notification'";
      shadow = false; },

    # ─ GTK invisible frame extents (CSD reserve area). v13 deprecated
    #   the `:c` type specifier; use `_GTK_FRAME_EXTENTS@` directly.
    { match = "_GTK_FRAME_EXTENTS@";
      shadow         = false;
      blur-background = false; },

    # ─ Dock window-type (panels/bars from other apps)
    { match = "window_type = 'dock'";
      shadow             = false;
      corner-radius      = 0;
      blur-background    = false;
      clip-shadow-above  = true; },

    # ─ Desktop window-type (root-window-equivalents)
    { match = "window_type = 'desktop'";
      corner-radius   = 0;
      blur-background = false; },

    # ─ Tooltip / drag-and-drop / popup / dropdown wintypes
    { match = "window_type = 'tooltip'";
      shadow  = false;
      opacity = 0.92; },
    { match = "window_type = 'dnd'";
      shadow = false; },
    { match = "window_type = 'popup_menu'";
      opacity = 0.95; },
    { match = "window_type = 'dropdown_menu'";
      opacity = 0.95; },

    # ─ Terminal transparency: 0.92 focused, 0.82 unfocused
    { match = "class_g = 'Alacritty' && focused";
      opacity = 0.92; },
    { match = "class_g = 'Alacritty' && !focused";
      opacity = 0.82; },
    { match = "class_g = 'kitty' && focused";
      opacity = 0.92; },
    { match = "class_g = 'kitty' && !focused";
      opacity = 0.82; },
    { match = "class_g = 'com.mitchellh.ghostty' && focused";
      opacity = 0.92; },
    { match = "class_g = 'com.mitchellh.ghostty' && !focused";
      opacity = 0.82; },
);

# No top-level `animations = (...)` block — the legacy `fading` master
# switch above gives the simple open/close/show/hide opacity fade we
# want for now. With the rules block in place, a future revisit of
# the workspace-pan slide can land animations selectively per-rule
# (e.g. exclude slop / maim / rofi from the slide trigger). See
# docs/gaps.md for the design notes.
