## nw-omarchy default picom.conf — upstream picom v13 (Arch extra: picom).
##
## Replaces the abandoned FT-Labs/picom fork (AUR picom-ftlabs-git, last
## commit Feb 2024). The FT-Labs animation system was designed for dwm
## and never engaged on bspwm tag-change events (verified via debug log:
## zero anim/slide log lines across 17 unmap/map events on workspace
## switch — only opacity-transition fading was happening).
##
## Upstream v13 (Feb 2026) ships a proper trigger-driven animation system
## with separate `show`/`hide` triggers (visibility changes) distinct from
## `open`/`close` (window lifecycle). bspwm fires X MapNotify/UnmapNotify
## on workspace switch — those are exactly the show/hide trigger events.

#─── backend ─────────────────────────────────────────────────────────
backend = "glx";
vsync = true;
unredir-if-possible = false;
use-damage = true;

#─── rounded corners ─────────────────────────────────────────────────
corner-radius = 8;
rounded-corners-exclude = [
    "class_g = 'polybar'",
    "class_g = 'i3lock'",
    "window_type = 'dock'",
    "window_type = 'desktop'"
];

#─── shadows ─────────────────────────────────────────────────────────
shadow = true;
shadow-radius = 8;
shadow-opacity = 0.55;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'polybar'",
    "_GTK_FRAME_EXTENTS@:c"
];

#─── opacity (terminal slight transparency, like the hypr config) ───
inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;

opacity-rule = [
    "92:class_g = 'Alacritty' && focused",
    "82:class_g = 'Alacritty' && !focused",
    "92:class_g = 'kitty' && focused",
    "82:class_g = 'kitty' && !focused",
    "92:class_g = 'com.mitchellh.ghostty' && focused",
    "82:class_g = 'com.mitchellh.ghostty' && !focused"
];

#─── blur ────────────────────────────────────────────────────────────
blur: {
    method = "dual_kawase";
    strength = 6;
    background = false;
    background-frame = false;
    background-fixed = false;
};
blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "_GTK_FRAME_EXTENTS@:c"
];

#─── fading ──────────────────────────────────────────────────────────
# Used for opacity-only transitions (focus changes, etc.). The
# animations block below handles slide / appear / disappear.
fading = true;
fade-in-step = 0.05;
fade-out-step = 0.05;
fade-delta = 8;

#─── window-type defaults ────────────────────────────────────────────
wintypes:
{
    tooltip       = { fade = true;  shadow = false; opacity = 0.92; focus = true; };
    dock          = { shadow = false; clip-shadow-above = true; };
    dnd           = { shadow = false; };
    popup_menu    = { opacity = 0.95; };
    dropdown_menu = { opacity = 0.95; };
};

#─── animations (picom v13 trigger schema) ──────────────────────────
# v13 picks animations by trigger type, not per-event keys. Triggers
# we use:
#   open  — window first mapped after creation (newly launched app)
#   close — window destroyed
#   show  — window made visible (bspwm fires this when mapping a
#           window from a workspace we're switching INTO)
#   hide  — window made invisible (bspwm fires this when unmapping a
#           window from a workspace we're switching OUT of)
#
# For window lifecycle (open/close) we use the appear/disappear
# presets — soft scale-and-fade.
#
# For workspace switch (show/hide) we DON'T use the slide-in/slide-out
# presets — those slide each window by its own width, which makes
# windows visibly "wiggle" within their tile bounds instead of
# behaving as a coherent workspace pan. Instead, custom offset-x
# scripts shift every window by exactly one monitor-width — since
# every window on the workspace shares window-monitor-width, they
# slide together and the visual effect is "the whole workspace slid
# in from the right / out to the left".
#
# Direction is fixed (incoming from right, outgoing to left) regardless
# of next/prev — bspwm doesn't tell picom which direction the user
# intended. No live preview during the gesture; bspwm signals only
# on switch completion. See docs/porting-hypr.md for the model
# mismatch with Hyprland's workspace_swipe.
animations = (
    {
        # Slide-in: covers BOTH workspace switch (show) and first-time
        # map of bspwm-deferred windows (open). bspwm doesn't map
        # windows on non-focused workspaces, so the first time you
        # visit workspace N, those windows hit picom as `open`, not
        # `show` — combining the triggers keeps the workspace pan
        # coherent on first-visit.
        #
        # Direction is fixed (incoming-from-right) regardless of
        # next/prev — picom doesn't know which direction the user
        # asked bspwm to switch in. Direction-sensitive workspace
        # animation would need a `bspc subscribe`-driven daemon that
        # swaps picom configs per switch (with its own flicker cost).
        triggers = ["open", "show"];
        offset-x = {
            curve = "cubic-bezier(0.4, 0, 0.2, 1)";  # material fast-out-slow-in
            duration = 0.45;
            start = "window-monitor-width";
            end = 0;
        };
        opacity = {
            curve = "linear";
            duration = 0.45;
            start = 0;
            end = "window-raw-opacity";
        };
    },
    {
        # Slide-out: covers BOTH workspace switch (hide) and window
        # destruction (close), same reasoning as above.
        triggers = ["close", "hide"];
        offset-x = {
            curve = "cubic-bezier(0.4, 0, 0.2, 1)";
            duration = 0.45;
            start = 0;
            # NB: minus needs spaces around it — `-window-monitor-width`
            # would parse as a single variable name.
            end = "0 - window-monitor-width";
        };
        opacity = {
            curve = "linear";
            duration = 0.45;
            start = "window-raw-opacity-before";
            end = 0;
        };
    }
);
